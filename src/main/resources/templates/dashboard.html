<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Fitness Logbook</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/theme.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-main {
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .dashboard-header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .dashboard-header h1 {
            font-size: 2rem;
            color: var(--text-main);
            margin: 0;
        }
        .dashboard-content {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }
        .chart-container {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
            flex: 2; /* takes up twice as much space as the forms */
            min-width: 0; /* allows flexbox to shrink the container if needed */
        }
        .dashboard-actions {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .action-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        @media (max-width: 1024px) {
            .dashboard-content {
                flex-direction: column;
            }
            .dashboard-actions {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
            }
            .action-card {
                flex: 1;
                min-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <header class="header">
            <a th:href="@{/}" class="logo" style="text-decoration: none;">FitnessLogbook</a>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
        </header>
        
        <main class="dashboard-main">
            <div class="dashboard-header">
                <h1>Welcome, <span th:text="${user.name}">User</span>!</h1>
            </div>

            <div th:if="${success}" class="alert-success" th:text="${success}" style="background-color: #dcfce7; color: #166534; padding: 1rem; border-radius: 8px; border: 1px solid #bbf7d0;"></div>
            <div th:if="${error}" class="alert-error" th:text="${error}" style="background-color: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 8px; border: 1px solid #fecaca;"></div>
            
            <div class="dashboard-content">
                <div class="chart-container">
                    <h2 style="margin-bottom: 1rem; text-align: center;">Weight Progress</h2>
                    <canvas id="weightChart"></canvas>
                    <div style="text-align: center; margin-top: 1.5rem;">
                        <a th:href="@{/weight/manage}" class="btn btn-outline">Manage Measurements</a>
                    </div>
                </div>
                
                <div class="dashboard-actions">
                    <div class="action-card">
                        <h3 style="margin-bottom: 1rem;">Add New Weight</h3>
                        <form th:action="@{/weight/add}" method="post" style="display: flex; flex-direction: column; gap: 1rem;">
                            <div>
                                <label for="weight" style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Weight (kg)</label>
                                <input type="number" id="weight" name="weight" step="0.1" min="0" required class="form-control" placeholder="e.g. 80.5">
                            </div>
                            <div>
                                <label for="date" style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Date (Optional)</label>
                                <input type="date" id="date" name="date" class="form-control">
                            </div>
                            <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem;">Add Weight</button>
                        </form>
                    </div>

                    <div class="action-card">
                        <h3 style="margin-bottom: 1rem;">Upload CSV Data</h3>
                        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;">Format: YYYY-MM-DD,weight</p>
                        <form th:action="@{/weight/upload}" method="post" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 1rem;">
                            <div>
                                <input type="file" id="file" name="file" accept=".csv" required class="form-control" style="padding: 0.5rem;">
                            </div>
                            <button type="submit" class="btn btn-outline" style="margin-top: 0.5rem;">Upload CSV</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Pinned Exercise Section -->
            <div th:if="${pinnedExerciseName != null}" style="margin-top: 3rem;">
                <h2 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">Pinned: <span th:text="${pinnedExerciseName}">Exercise</span></h2>
                <div class="chart-container" style="max-width: 100%;">
                    <canvas id="pinnedExerciseChart"></canvas>
                </div>
            </div>

            <!-- Exercises Section -->
            <div style="margin-top: 3rem;">
                <h2 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">Exercises</h2>
                
                <div class="dashboard-content">
                    <div class="chart-container" style="flex: 2;">
                        <h3 style="margin-bottom: 1rem;">Your Exercises</h3>
                        <div style="display: flex; flex-wrap: wrap; gap: 1rem;">
                            <a th:each="exercise : ${user.exercises}" th:href="@{/exercise/{name}(name=${exercise.name})}" class="btn btn-outline" th:text="${exercise.name}">Exercise</a>
                            <span th:if="${#lists.isEmpty(user.exercises)}" style="color: var(--text-muted);">No exercises yet. Create one!</span>
                        </div>
                    </div>

                    <div class="dashboard-actions" style="flex: 1;">
                        <div class="action-card">
                            <h3 style="margin-bottom: 1rem;">Create New Exercise</h3>
                            <form th:action="@{/exercise/add}" method="post" style="display: flex; flex-direction: column; gap: 1rem;">
                                <div>
                                    <label for="exerciseName" style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Exercise Name</label>
                                    <input type="text" id="exerciseName" name="name" required class="form-control" placeholder="e.g. Bench Press">
                                </div>
                                <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem;">Create</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const chartLabels = /*[[${chartLabels}]]*/ [];
        const chartData = /*[[${chartData}]]*/ [];
        /*]]>*/

        const ctx = document.getElementById('weightChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartLabels,
                datasets: [{
                    label: 'Weight (kg)',
                    data: chartData,
                    borderColor: '#2563eb',
                    backgroundColor: 'rgba(37, 99, 235, 0.1)',
                    borderWidth: 2,
                    pointBackgroundColor: '#2563eb',
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    fill: true,
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: false,
                        title: {
                            display: true,
                            text: 'Weight (kg)'
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Date'
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });

        /*<![CDATA[*/
        const pinnedChartLabels = /*[[${pinnedChartLabels}]]*/ null;
        const pinnedChartData = /*[[${pinnedChartData}]]*/ null;
        /*]]>*/

        if (pinnedChartLabels && pinnedChartLabels.length > 0) {
            const pinnedCtx = document.getElementById('pinnedExerciseChart').getContext('2d');
            new Chart(pinnedCtx, {
                type: 'line',
                data: {
                    labels: pinnedChartLabels,
                    datasets: [{
                        label: 'Max Weight (kg)',
                        data: pinnedChartData,
                        borderColor: '#10b981', // green for distinction
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#10b981',
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Weight (kg)'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Date'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
