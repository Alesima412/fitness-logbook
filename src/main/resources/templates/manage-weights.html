<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Weights - Fitness Logbook</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/theme.js}"></script>
    <style>
        .table-container {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            font-weight: 600;
            color: var(--text-muted);
        }
        .form-inline {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .form-inline input {
            width: auto;
            padding: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <header class="header">
            <a th:href="@{/}" class="logo" style="text-decoration: none;">FitnessLogbook</a>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
        </header>

        <main style="padding: 2rem 0; display: flex; flex-direction: column; gap: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto; width: 100%;">
                <h1 style="margin: 0;">Manage Measurements</h1>
                <a th:href="@{/dashboard}" class="btn btn-outline">&larr; Back to Dashboard</a>
            </div>

            <div th:if="${success}" class="alert-success" th:text="${success}" style="background-color: #dcfce7; color: #166534; padding: 1rem; border-radius: 8px; border: 1px solid #bbf7d0; max-width: 800px; margin: 0 auto; width: 100%;"></div>
            <div th:if="${error}" class="alert-error" th:text="${error}" style="background-color: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 8px; border: 1px solid #fecaca; max-width: 800px; margin: 0 auto; width: 100%;"></div>

            <div class="table-container">
                <table th:if="${not #lists.isEmpty(measurements)}">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Weight (kg)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="measurement : ${measurements}">
                            <td>
                                <form th:action="@{/weight/update/{id}(id=${measurement.id})}" method="post" class="form-inline" th:id="'update-form-' + ${measurement.id}">
                                    <input type="date" name="date" th:value="${measurement.date}" class="form-control" required>
                                </form>
                            </td>
                            <td>
                                <input type="number" name="weight" step="0.1" min="0" th:value="${measurement.weight}" th:form="'update-form-' + ${measurement.id}" class="form-control" required style="width: 100px;">
                            </td>
                            <td>
                                <div style="display: flex; gap: 0.5rem;">
                                    <button type="submit" th:form="'update-form-' + ${measurement.id}" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.85rem;">Save</button>
                                    <form th:action="@{/weight/delete/{id}(id=${measurement.id})}" method="post" style="margin: 0;">
                                        <button type="submit" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.85rem; color: #ef4444; border-color: #ef4444;">Delete</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <p th:if="${#lists.isEmpty(measurements)}" style="text-align: center; color: var(--text-muted);">No measurements found.</p>
            </div>
        </main>
    </div>
</body>
</html>
